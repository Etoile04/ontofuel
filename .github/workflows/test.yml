name: Tests

on:
  push:
    branches: [main, ontofuel-v0.1, "feature/*"]
  pull_request:
    branches: [main, ontofuel-v0.1]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        # Install optional deps for full test coverage
        pip install fastapi uvicorn psycopg2-binary sphinx
    - name: Run tests
      run: pytest tests/ --ignore=tests/test_docker_integration.py -v --tb=short --cov=ontofuel --cov-report=xml
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.12'
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
