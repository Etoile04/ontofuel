<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OntoFuel Materials Manager</title>
<style>
  :root {
    --primary: #1a1a2e;
    --primary-light: #16213e;
    --accent: #0f3460;
    --accent-light: #533483;
    --success: #2ecc71;
    --warning: #f39c12;
    --danger: #e74c3c;
    --text: #e0e0e0;
    --text-muted: #a0a0a0;
    --bg: #0d0d1a;
    --card-bg: #1a1a2e;
    --border: #2a2a4e;
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

  /* Header */
  header {
    background: var(--primary);
    padding: 16px 24px;
    border-radius: var(--radius);
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  header h1 { font-size: 1.5rem; font-weight: 600; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    display: inline-block;
  }
  .status-dot.connected { background: var(--success); }
  .status-dot.disconnected { background: var(--danger); }

  /* Stats Cards */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }

  .stat-card .count { font-size: 2rem; font-weight: 700; }
  .stat-card .label { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
  .stat-card.fuel .count { color: #f1c40f; }
  .stat-card.structural .count { color: #95a5a6; }
  .stat-card.coolant .count { color: #3498db; }
  .stat-card.ceramic .count { color: #e67e22; }
  .stat-card.total .count { color: var(--success); }

  /* Toolbar */
  .toolbar {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .toolbar input, .toolbar select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 0.9rem;
  }

  .toolbar input { flex: 1; min-width: 200px; }
  .toolbar select { min-width: 160px; }

  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-success { background: var(--success); color: #111; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-sm { padding: 4px 10px; font-size: 0.8rem; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* Table */
  .table-wrapper {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 12px 16px;
    background: var(--primary-light);
    font-size: 0.85rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  td { padding: 12px 16px; border-top: 1px solid var(--border); }
  tr:hover td { background: rgba(255,255,255,0.03); }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.78rem;
    font-weight: 500;
  }
  .badge-fuel { background: rgba(241,196,15,0.2); color: #f1c40f; }
  .badge-structural { background: rgba(149,165,166,0.2); color: #bdc3c7; }
  .badge-coolant { background: rgba(52,152,219,0.2); color: #3498db; }
  .badge-ceramic { background: rgba(230,126,34,0.2); color: #e67e22; }

  .actions { display: flex; gap: 6px; }

  /* Properties Panel */
  .props-panel {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-top: 8px;
    padding: 12px;
  }

  .props-panel h4 { margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); }

  .props-table { width: 100%; font-size: 0.85rem; }
  .props-table td { padding: 4px 8px; border: none; }
  .props-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .add-prop-form {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
  }

  .add-prop-form input {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: var(--radius);
    font-size: 0.85rem;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 90%;
    max-width: 480px;
  }

  .modal h2 { margin-bottom: 16px; }

  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 0.9rem;
  }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    border-radius: var(--radius);
    color: white;
    font-size: 0.9rem;
    z-index: 2000;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: var(--success); color: #111; }
  .toast.error { background: var(--danger); }

  .loading { text-align: center; padding: 24px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <header>
    <h1>🔬 OntoFuel Materials Manager</h1>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card total">
      <div class="count" id="statTotal">0</div>
      <div class="label">Total Materials</div>
    </div>
    <div class="stat-card fuel">
      <div class="count" id="statFuel">0</div>
      <div class="label">Fuel</div>
    </div>
    <div class="stat-card structural">
      <div class="count" id="statStructural">0</div>
      <div class="label">Structural</div>
    </div>
    <div class="stat-card coolant">
      <div class="count" id="statCoolant">0</div>
      <div class="label">Coolant</div>
    </div>
    <div class="stat-card ceramic">
      <div class="count" id="statCeramic">0</div>
      <div class="label">Ceramic</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search materials..." />
    <select id="typeFilter">
      <option value="">All Types</option>
      <option value="FuelMaterial">Fuel</option>
      <option value="StructuralMaterial">Structural</option>
      <option value="CoolantMaterial">Coolant</option>
      <option value="CeramicMaterial">Ceramic</option>
    </select>
    <button class="btn btn-primary" onclick="openCreateModal()">+ Add Material</button>
  </div>

  <!-- Materials Table -->
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Formula</th>
          <th>Type</th>
          <th>Properties</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="materialsBody">
        <tr><td colspan="5" class="loading">Loading materials...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Create/Edit Modal -->
<div class="modal-overlay" id="materialModal">
  <div class="modal">
    <h2 id="modalTitle">Add Material</h2>
    <input type="hidden" id="editId" />
    <div class="form-group">
      <label for="matName">Name *</label>
      <input type="text" id="matName" required />
    </div>
    <div class="form-group">
      <label for="matFormula">Chemical Formula</label>
      <input type="text" id="matFormula" />
    </div>
    <div class="form-group">
      <label for="matType">Material Type</label>
      <select id="matType">
        <option value="FuelMaterial">Fuel</option>
        <option value="StructuralMaterial">Structural</option>
        <option value="CoolantMaterial">Coolant</option>
        <option value="CeramicMaterial">Ceramic</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success" id="modalSaveBtn" onclick="saveMaterial()">Create</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// Auto-detect API host
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:8000'
  : `http://${window.location.hostname}:8000`;
const API_URL = API_BASE + '/api/materials';

let allMaterials = [];

// --- API ---
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_URL + path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || res.statusText);
  }
  return res.json();
}

// --- Connection Status ---
function setConnected(v) {
  document.getElementById('statusDot').className = 'status-dot ' + (v ? 'connected' : 'disconnected');
  document.getElementById('statusText').textContent = v ? 'Connected' : 'Disconnected';
}

// --- Load Materials ---
async function loadMaterials() {
  try {
    allMaterials = await api('GET', '');
    setConnected(true);
    renderMaterials();
    updateStats();
  } catch (e) {
    setConnected(false);
    document.getElementById('materialsBody').innerHTML =
      `<tr><td colspan="5" class="empty-state">Failed to load materials: ${e.message}</td></tr>`;
  }
}

// --- Stats ---
function updateStats() {
  document.getElementById('statTotal').textContent = allMaterials.length;
  document.getElementById('statFuel').textContent = allMaterials.filter(m => m.material_type === 'FuelMaterial').length;
  document.getElementById('statStructural').textContent = allMaterials.filter(m => m.material_type === 'StructuralMaterial').length;
  document.getElementById('statCoolant').textContent = allMaterials.filter(m => m.material_type === 'CoolantMaterial').length;
  document.getElementById('statCeramic').textContent = allMaterials.filter(m => m.material_type === 'CeramicMaterial').length;
}

// --- Badge helpers ---
function typeBadge(type) {
  const map = {
    FuelMaterial: ['fuel', 'Fuel'],
    StructuralMaterial: ['structural', 'Structural'],
    CoolantMaterial: ['coolant', 'Coolant'],
    CeramicMaterial: ['ceramic', 'Ceramic'],
  };
  const [cls, label] = map[type] || ['structural', type || 'Unknown'];
  return `<span class="badge badge-${cls}">${label}</span>`;
}

function propCount(mat) {
  return (mat.properties || []).length;
}

// --- Render ---
function renderMaterials() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const typeFilter = document.getElementById('typeFilter').value;

  let filtered = allMaterials;
  if (search) {
    filtered = filtered.filter(m =>
      (m.name || '').toLowerCase().includes(search) ||
      (m.chemical_formula || '').toLowerCase().includes(search)
    );
  }
  if (typeFilter) {
    filtered = filtered.filter(m => m.material_type === typeFilter);
  }

  const tbody = document.getElementById('materialsBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No materials found</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(m => `
    <tr>
      <td><strong>${esc(m.name)}</strong></td>
      <td>${esc(m.chemical_formula || '—')}</td>
      <td>${typeBadge(m.material_type)}</td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="toggleProps(${m.id})">
          View (${propCount(m)})
        </button>
      </td>
      <td class="actions">
        <button class="btn btn-outline btn-sm" onclick='openEditModal(${JSON.stringify(m).replace(/'/g, "&#39;")})'>Edit</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete(${m.id}, '${esc(m.name)}')">Delete</button>
      </td>
    </tr>
    <tr class="props-row" id="props-${m.id}" style="display:none">
      <td colspan="5">
        <div class="props-panel">
          <h4>Properties</h4>
          <table class="props-table">
            <thead><tr><th>Property</th><th>Value</th><th>Unit</th></tr></thead>
            <tbody>
              ${(m.properties || []).map(p => `
                <tr>
                  <td>${esc(p.property_name)}</td>
                  <td>${esc(String(p.property_value))}</td>
                  <td>${esc(p.unit || '—')}</td>
                </tr>
              `).join('') || '<tr><td colspan="3" style="color:var(--text-muted)">No properties</td></tr>'}
            </tbody>
          </table>
          <div class="add-prop-form">
            <input type="text" id="propName-${m.id}" placeholder="Property name" />
            <input type="text" id="propVal-${m.id}" placeholder="Value" />
            <input type="text" id="propUnit-${m.id}" placeholder="Unit" />
            <button class="btn btn-success btn-sm" onclick="addProperty(${m.id})">Add</button>
          </div>
        </div>
      </td>
    </tr>
  `).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// --- Properties toggle ---
function toggleProps(id) {
  const row = document.getElementById('props-' + id);
  row.style.display = row.style.display === 'none' ? '' : 'none';
}

// --- Add Property ---
async function addProperty(materialId) {
  const name = document.getElementById('propName-' + materialId).value.trim();
  const value = document.getElementById('propVal-' + materialId).value.trim();
  const unit = document.getElementById('propUnit-' + materialId).value.trim();
  if (!name || !value) { toast('Property name and value are required', 'error'); return; }
  try {
    await api('POST', `/${materialId}/properties`, { property_name: name, property_value: value, unit });
    toast('Property added');
    await loadMaterials();
  } catch (e) { toast(e.message, 'error'); }
}

// --- Create/Edit Modal ---
function openCreateModal() {
  document.getElementById('modalTitle').textContent = 'Add Material';
  document.getElementById('modalSaveBtn').textContent = 'Create';
  document.getElementById('editId').value = '';
  document.getElementById('matName').value = '';
  document.getElementById('matFormula').value = '';
  document.getElementById('matType').value = 'FuelMaterial';
  document.getElementById('materialModal').classList.add('active');
}

function openEditModal(mat) {
  document.getElementById('modalTitle').textContent = 'Edit Material';
  document.getElementById('modalSaveBtn').textContent = 'Save';
  document.getElementById('editId').value = mat.id;
  document.getElementById('matName').value = mat.name || '';
  document.getElementById('matFormula').value = mat.chemical_formula || '';
  document.getElementById('matType').value = mat.material_type || 'FuelMaterial';
  document.getElementById('materialModal').classList.add('active');
}

function closeModal() {
  document.getElementById('materialModal').classList.remove('active');
}

async function saveMaterial() {
  const id = document.getElementById('editId').value;
  const name = document.getElementById('matName').value.trim();
  if (!name) { toast('Name is required', 'error'); return; }
  const body = {
    name,
    chemical_formula: document.getElementById('matFormula').value.trim() || null,
    material_type: document.getElementById('matType').value,
  };
  try {
    if (id) {
      await api('PUT', `/${id}`, body);
      toast('Material updated');
    } else {
      await api('POST', '', body);
      toast('Material created');
    }
    closeModal();
    await loadMaterials();
  } catch (e) { toast(e.message, 'error'); }
}

// --- Delete ---
function confirmDelete(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  deleteMaterial(id);
}

async function deleteMaterial(id) {
  try {
    await api('DELETE', `/${id}`);
    toast('Material deleted');
    await loadMaterials();
  } catch (e) { toast(e.message, 'error'); }
}

// --- Toast ---
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 3000);
}

// --- Search/Filter listeners ---
document.getElementById('searchInput').addEventListener('input', renderMaterials);
document.getElementById('typeFilter').addEventListener('change', renderMaterials);

// --- Close modal on overlay click ---
document.getElementById('materialModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// --- Init ---
loadMaterials();
</script>
</body>
</html>
