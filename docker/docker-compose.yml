services:
  db:
    image: supabase/postgres:15.6.1
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ontofuel}
    volumes:
      - ./supabase/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../
      dockerfile: docker/api/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ontofuel}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}

  web:
    build:
      context: ../
      dockerfile: docker/web/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
